<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIR INDIA CHAT BOT</title>
  <style>
    :root {
      --ai-red: #b11226;
      --ai-red-dark: #8e0e1e;
      --ai-gold: #c8a45c;
      --bg: #f4f4f6;
      --bot-bubble: #ffffff;
      --text: #1d1d1f;
      --muted: #6b6b70;
      --border: #e3e3e7;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat {
      width: 100%;
      max-width: 720px;
      height: 100vh;
      max-height: 880px;
      background: #fff;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
      border-radius: 14px;
      overflow: hidden;
    }

    /* Header */
    header {
      background: var(--ai-red);
      color: #fff;
      padding: 18px 22px;
      border-bottom: 3px solid var(--ai-gold);
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      margin: 0;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 2.5px;
    }
    header p {
      margin: 4px 0 0;
      font-size: 12.5px;
      letter-spacing: 0.3px;
      color: rgba(255, 255, 255, 0.85);
    }
    .new-chat {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .new-chat:hover { background: rgba(255, 255, 255, 0.15); }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: var(--bg);
    }
    .msg { max-width: 78%; line-height: 1.5; font-size: 14.5px; }
    .msg .bubble {
      padding: 11px 15px;
      border-radius: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg .who {
      font-size: 11px;
      letter-spacing: 0.6px;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    .msg.user { align-self: flex-end; }
    .msg.user .bubble {
      background: var(--ai-red);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.user .who { text-align: right; }
    .msg.bot { align-self: flex-start; }
    .msg.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* Typing indicator */
    .typing { display: inline-flex; gap: 4px; align-items: center; padding: 4px 2px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted); opacity: 0.5;
      animation: blink 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.25; } 40% { opacity: 0.9; } }

    /* Composer */
    .composer {
      display: flex;
      gap: 10px;
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      background: #fff;
    }
    .composer input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 12px 16px;
      font-size: 14.5px;
      outline: none;
      transition: border-color 0.15s ease;
    }
    .composer input:focus { border-color: var(--ai-red); }
    .composer button {
      background: var(--ai-red);
      color: #fff;
      border: none;
      border-radius: 22px;
      padding: 0 22px;
      font-size: 14px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .composer button:hover:not(:disabled) { background: var(--ai-red-dark); }
    .composer button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat">
    <header>
      <div class="header-row">
        <div>
          <h1>AIR INDIA CHAT BOT</h1>
          <p>Ask about the fleet, routes, regulations and history</p>
        </div>
        <button class="new-chat" id="newChat">New chat</button>
      </div>
    </header>

    <div class="messages" id="messages"></div>

    <form class="composer" id="composer">
      <input id="input" type="text" autocomplete="off"
             placeholder="Type your question..." />
      <button id="send" type="submit">Send</button>
    </form>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const form = document.getElementById("composer");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    // Persist a session id per browser so the bot remembers context across reloads.
    function sessionId() {
      let id = localStorage.getItem("ai_session");
      if (!id) {
        id = "web-" + (crypto.randomUUID ? crypto.randomUUID() : Date.now());
        localStorage.setItem("ai_session", id);
      }
      return id;
    }

    function scrollDown() { messagesEl.scrollTop = messagesEl.scrollHeight; }

    function addMessage(who, text) {
      const wrap = document.createElement("div");
      wrap.className = "msg " + (who === "you" ? "user" : "bot");
      const label = document.createElement("div");
      label.className = "who";
      label.textContent = who === "you" ? "You" : "Air India";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      wrap.appendChild(label);
      wrap.appendChild(bubble);
      messagesEl.appendChild(wrap);
      scrollDown();
      return bubble;
    }

    function addTyping() {
      const wrap = document.createElement("div");
      wrap.className = "msg bot";
      wrap.innerHTML =
        '<div class="who">Air India</div>' +
        '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
      messagesEl.appendChild(wrap);
      scrollDown();
      return wrap;
    }

    async function sendMessage(text) {
      addMessage("you", text);
      input.value = "";
      input.disabled = true;
      sendBtn.disabled = true;
      const typing = addTyping();

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, session_id: sessionId() }),
        });

        typing.remove();
        const bubble = addMessage("bot", "");
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          bubble.textContent += decoder.decode(value, { stream: true });
          scrollDown();
        }
        if (!bubble.textContent) bubble.textContent = "[No response received.]";
      } catch (err) {
        typing.remove();
        addMessage("bot", "[Could not reach the server. Please try again.]");
      } finally {
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (text) sendMessage(text);
    });

    document.getElementById("newChat").addEventListener("click", () => {
      localStorage.removeItem("ai_session");
      sessionId();
      messagesEl.innerHTML = "";
      greet();
      input.focus();
    });

    function greet() {
      addMessage("bot",
        "Welcome to the Air India assistant. Ask me about the fleet, routes, service regulations, or history.");
    }

    greet();
    input.focus();
  </script>
</body>
</html>
